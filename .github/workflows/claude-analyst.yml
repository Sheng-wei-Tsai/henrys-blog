name: Claude Daily Analyst (Opus)

# Runs every hour. Exits in seconds if already ran today.
# First run after Anthropic quota resets → deep analysis with Opus 4.7
# → writes tasks to TODO.md → opens [Daily Analysis] GitHub Issue

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  analyst:
    name: Opus Analyst
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if analysis already done today
        id: guard
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "today=${TODAY}" >> $GITHUB_OUTPUT
          EXISTING=$(git ls-remote --heads origin "analysis/${TODAY}" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$EXISTING" -gt "0" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already done today. Exiting."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Starting Opus analysis."
          fi

      - name: Configure git and gh auth
        if: steps.guard.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "TechPath Opus Analyst"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          gh auth status 2>&1 || true  # GH_TOKEN env var handles auth automatically

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip == 'false'
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: npm ci

      - name: Install Claude Code CLI
        if: steps.guard.outputs.skip == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Opus analyst
        id: opus
        if: steps.guard.outputs.skip == 'false'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          claude \
            --dangerously-skip-permissions \
            --model claude-opus-4-7 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep" \
            -p "$(cat .github/prompts/analyst.md)" 2>&1 | tee opus.log
          OPUS_EXIT=${PIPESTATUS[0]}

          if grep -qiE "hit your limit|credit balance is too low|quota.*exceeded|rate limit|5-hour limit|usage limit reached|claude ai usage limit|try again.{0,30}(hour|later)" opus.log; then
            echo "::warning::Opus quota hit — analysis sentinel will be created to prevent hourly retries"
            echo "quota_hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "quota_hit=false" >> "$GITHUB_OUTPUT"
          fi

          # Always exit 0 — sentinel creation handles the retry-prevention
          exit 0

      - name: Create analysis marker branch
        if: steps.guard.outputs.skip == 'false' && (success() || failure())
        env:
          TODAY: ${{ steps.guard.outputs.today }}
        run: |
          # Push sentinel ALWAYS — even on quota hit — so hourly cron stops retrying today
          git checkout -b "analysis/${TODAY}" 2>/dev/null || true
          git push origin "analysis/${TODAY}" 2>/dev/null || true
          git checkout main
