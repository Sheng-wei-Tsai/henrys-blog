name: Claude Daily Analyst (Opus)

# Runs every hour. Exits in seconds if already ran today.
# First run after Anthropic quota resets → deep analysis with Opus 4.7
# → writes tasks to TODO.md → opens [Daily Analysis] GitHub Issue

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  analyst:
    name: Opus Analyst
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if analysis already done today
        id: guard
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "today=${TODAY}" >> $GITHUB_OUTPUT
          EXISTING=$(git ls-remote --heads origin "analysis/${TODAY}" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$EXISTING" -gt "0" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already done today. Exiting."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Starting Opus analysis."
          fi

      - name: Configure git and gh auth
        if: steps.guard.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "TechPath Opus Analyst"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          echo "${GITHUB_TOKEN}" | gh auth login --with-token

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip == 'false'
        with:
          node-version: 22

      - name: Install Claude Code CLI
        if: steps.guard.outputs.skip == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Opus analyst
        if: steps.guard.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude \
            --bare \
            --dangerously-skip-permissions \
            --model claude-opus-4-7 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep" \
            -p "$(cat .github/prompts/analyst.md)"

      - name: Create analysis marker branch
        if: steps.guard.outputs.skip == 'false'
        env:
          TODAY: ${{ steps.guard.outputs.today }}
        run: |
          git checkout -b "analysis/${TODAY}" 2>/dev/null || true
          git push origin "analysis/${TODAY}" 2>/dev/null || true
          git checkout main
