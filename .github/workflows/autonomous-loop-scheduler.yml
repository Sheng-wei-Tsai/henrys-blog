name: Autonomous Loop Scheduler

# Fires every hour. Up to 4 autonomous-loop runs per UTC day (one per
# ~5-hour quota window). 4.5h spacing guard prevents double-firing.
#
# Brisbane (UTC+10) daily quota windows — aligned to your schedule:
#   Window 1: 04:50 AEST (18:50 UTC) — quota reset while you SLEEP
#             → cron fires at 19:00 UTC (05:00 AEST), runs until ~07:50
#   Window 2: ~12:30 AEST (02:30 UTC) — quota reset while you're AT WORK
#             → cron fires at 03:00 UTC (13:00 AEST), posts + dev tasks
#   Window 3: ~17:30 AEST (07:30 UTC) — quota reset when you get HOME
#             → idle-trigger handles this (you end session, 60 min fires)
#   Window 4: as available — watcher or cron
#
# Mac on  → claude-window-watcher.sh fires immediately at reset epoch
# Mac off → this hourly cron fires within 60 min as cloud fallback

on:
  schedule:
    - cron: '0 * * * *'    # hourly — guards below skip until after 14:00 UTC reset
  workflow_dispatch:         # manual trigger for holiday/custom runs
    inputs:
      max_iterations:
        description: 'Max iterations (default 10 ≈ full quota day)'
        default: '10'
        type: string
      max_open_prs:
        description: 'Pause if this many unreviewed PRs open (raise for holidays)'
        default: '5'
        type: string

permissions:
  actions: write

jobs:
  launch:
    name: Launch Autonomous Loop
    runs-on: ubuntu-latest

    steps:
      - name: Check quota windows (allow up to 4/day, spaced 4.5h apart)
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          NOW_EPOCH=$(date +%s)

          # Skip if quota sentinel is active (epoch-based, self-expiring)
          SENTINEL=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads" \
            --jq '[.[] | select(.ref | startswith("refs/heads/quota-reset-at/"))] | sort_by(.ref) | last | .ref' \
            --silent 2>/dev/null || echo "")
          if [ -n "$SENTINEL" ] && [ "$SENTINEL" != "null" ]; then
            EPOCH=$(echo "$SENTINEL" | sed 's|refs/heads/quota-reset-at/||')
            if echo "$EPOCH" | grep -qE '^[0-9]{10}$' && [ "$NOW_EPOCH" -lt "$EPOCH" ]; then
              WAIT=$(( (EPOCH - NOW_EPOCH) / 60 ))
              HUMAN=$(date -u -d "@${EPOCH}" '+%H:%M UTC')
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "Quota resets at ${HUMAN} (in ${WAIT} min). Skipping."
              exit 0
            fi
          fi

          # Count how many windows have already run today
          WIN_COUNT=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads" \
            --jq "[.[] | select(.ref | startswith("refs/heads/dev-done/${TODAY}-w"))] | length" \
            --silent 2>/dev/null || echo "0")

          if [ "$WIN_COUNT" -ge "4" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "All 4 quota windows used today. Skipping."
            exit 0
          fi

          # Spacing guard: skip if most recent dev-done window was < 4.5 hours ago
          # Prevents firing twice inside the same 5-hour quota window
          MIN_GAP_SECS=16200   # 4.5 hours
          if [ "$WIN_COUNT" -gt "0" ]; then
            LAST_WIN=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads" \
              --jq "[.[] | select(.ref | startswith("refs/heads/dev-done/${TODAY}-w"))] | sort_by(.object.sha) | last | .ref" \
              --silent 2>/dev/null || echo "")
            if [ -n "$LAST_WIN" ]; then
              LAST_TS=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/$(gh api repos/${GITHUB_REPOSITORY}/git/ref/${LAST_WIN#refs/} --jq .object.sha --silent 2>/dev/null)" \
                --jq ".committer.date" --silent 2>/dev/null || echo "")
              if [ -n "$LAST_TS" ]; then
                LAST_EPOCH=$(date -d "$LAST_TS" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$LAST_TS" +%s 2>/dev/null || echo "0")
                GAP=$(( NOW_EPOCH - LAST_EPOCH ))
                if [ "$GAP" -lt "$MIN_GAP_SECS" ]; then
                  WAIT_MINS=$(( (MIN_GAP_SECS - GAP) / 60 ))
                  echo "skip=true" >> $GITHUB_OUTPUT
                  echo "Last window was ${GAP}s ago — need ${MIN_GAP_SECS}s gap. Wait ~${WAIT_MINS} min."
                  exit 0
                fi
              fi
            fi
          fi

          WINDOW=$((WIN_COUNT + 1))
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "window=${WINDOW}" >> $GITHUB_OUTPUT
          echo "Launching window ${WINDOW}/4 for ${TODAY}."

      - name: Trigger autonomous loop
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_ITER: ${{ inputs.max_iterations || '10' }}
          MAX_PRS: ${{ inputs.max_open_prs || '5' }}
        run: |
          WINDOW="${{ steps.guard.outputs.window }}"
          SESSION_ID="sched-$(date -u +%Y%m%dT%H%M)-w${WINDOW}"
          gh workflow run autonomous-loop.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field iteration="1" \
            --field session_id="${SESSION_ID}" \
            --field max_iterations="${MAX_ITER}" \
            --field max_open_prs="${MAX_PRS}" \
            --field window="${WINDOW}"
          echo "Launched: session=${SESSION_ID}, window=${WINDOW}, max_iter=${MAX_ITER}"
