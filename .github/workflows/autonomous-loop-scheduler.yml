name: Autonomous Loop Daily Scheduler

# Fires at midnight AEST (14:00 UTC, Brisbane is UTC+10 with no daylight saving).
# Kicks off the autonomous loop so agents work while you sleep or are on holiday.
#
# Flow each day:
#   Iteration 1  → Opus 4.7 deep-analyses codebase, populates TODO.md
#   Iterations 2–11 → Sonnet 4.6 implements one task per iteration, opens PR
#   Until quota exhausted → Copilot fallback issue created automatically
#
# Holiday mode: leave this running. It fires every night, burns quota
# implementing tasks, falls back to Copilot, then resets next day.
# Raise max_open_prs if you won't be reviewing PRs for several days.

on:
  schedule:
    - cron: '0 14 * * *'   # midnight AEST (UTC+10) every night
  workflow_dispatch:         # manual trigger for holiday/custom runs
    inputs:
      max_iterations:
        description: 'Max iterations (default 10 ≈ full quota day)'
        default: '10'
        type: string
      max_open_prs:
        description: 'Pause if this many unreviewed PRs open (raise for holidays)'
        default: '5'
        type: string

permissions:
  actions: write

jobs:
  launch:
    name: Launch Autonomous Loop
    runs-on: ubuntu-latest

    steps:
      - name: Check if loop already ran today
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          EXHAUSTED=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/quota-exhausted/${TODAY}" \
            --silent 2>/dev/null && echo "1" || echo "0")
          AUTO=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads" \
            --jq "[.[] | select(.ref | startswith(\"refs/heads/auto/${TODAY}/\"))] | length" \
            --silent 2>/dev/null || echo "0")
          if [ "$EXHAUSTED" = "1" ] || [ "$AUTO" -gt "0" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Loop already ran or quota exhausted today. Skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Launching autonomous loop for ${TODAY}."
          fi

      - name: Trigger autonomous loop
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_ITER: ${{ inputs.max_iterations || '10' }}
          MAX_PRS: ${{ inputs.max_open_prs || '5' }}
        run: |
          SESSION_ID="sched-$(date -u +%Y%m%d)"
          gh workflow run autonomous-loop.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field iteration="1" \
            --field session_id="${SESSION_ID}" \
            --field max_iterations="${MAX_ITER}" \
            --field max_open_prs="${MAX_PRS}"
          echo "Launched: session=${SESSION_ID}, max_iter=${MAX_ITER}, max_prs=${MAX_PRS}"
