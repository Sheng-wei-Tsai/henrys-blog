          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run AI News
        run: npx tsx scripts/fetch-ai-news.ts
        env:
