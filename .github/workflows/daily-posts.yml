name: Daily Posts

# Cron disabled — ANTHROPIC_API_KEY credits exhausted.
# Posts now generated by idle-posts.yml via Claude Code Pro quota.
# Keep as manual fallback when API credits are available.
on:
  workflow_dispatch: # manual trigger only

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Daily Post
        run: npx tsx scripts/run-post.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
