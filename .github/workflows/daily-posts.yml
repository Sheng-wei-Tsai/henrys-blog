name: Daily Posts

# Daily content pipelines (digest, githot, ai-news, visa-news).
#
# All jobs authenticate to Claude via CLAUDE_CODE_OAUTH_TOKEN (Claude Code Pro
# subscription), NOT the pay-as-you-go ANTHROPIC_API_KEY. Each script shells out
# to the `claude` CLI through scripts/llm-claude.ts.
#
# The blog `post` job lives in idle-posts.yml — do not reintroduce it here.
#
# Cron windows are spread across the day so each heavy job gets its own
# 5-hour Claude Pro quota window (quota resets ~every 5h). Schedule:
#   22:00 UTC (8am AEST)  → blog post           (idle-posts.yml)
#   05:00 UTC (3pm AEST)  → githot              (this file, 10 Sonnet calls)
#   11:00 UTC (9pm AEST)  → digest              (this file, ~7 Sonnet calls)
#   17:00 UTC (3am AEST)  → ai-news + visa-news (this file, light enrichment)
#
# Each pair is ≥5h apart so no two heavy jobs share a quota window.
# Previously all four ran 23:00–23:30 UTC sharing one window → 7 days of
# silent failures (quota exhausted by the 3rd job).
#
# Fallback: if Claude Pro quota is exhausted mid-run, scripts/llm-claude.ts
# automatically falls back to the GitHub Models API (Copilot Pro+ rate
# limit) using GH_MODELS_TOKEN. Requires `permissions: models: read`.

on:
  schedule:
    - cron: '0 17 * * *'   # ai-news + visa-news (3am AEST — own quota window)
    - cron: '0 5 * * *'    # githot (3pm AEST)
    - cron: '0 11 * * *'   # digest (9pm AEST)
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  ai-news:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 17 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Run AI News
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          npx tsx scripts/fetch-ai-news.ts 2>&1 | tee ai-news.log
          EXIT=${PIPESTATUS[0]}
          if grep -qiE "hit your limit|quota.*exceeded|rate limit|5-hour limit|usage limit" ai-news.log; then
            echo "::warning::Claude quota hit — ai-news will retry in next window"
            exit 0
          fi
          exit $EXIT

  visa-news:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 17 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Run Visa News
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          npx tsx scripts/fetch-visa-news.ts 2>&1 | tee visa-news.log
          EXIT=${PIPESTATUS[0]}
          if grep -qiE "hit your limit|quota.*exceeded|rate limit|5-hour limit|usage limit" visa-news.log; then
            echo "::warning::Claude quota hit — visa-news will retry in next window"
            exit 0
          fi
          exit $EXIT

  githot:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 5 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Run GitHub Hot
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          npx tsx scripts/run-githot.ts 2>&1 | tee githot.log
          EXIT=${PIPESTATUS[0]}
          if grep -qiE "hit your limit|quota.*exceeded|rate limit|5-hour limit|usage limit" githot.log; then
            echo "::warning::Claude quota hit — githot will retry in next window"
            exit 0
          fi
          exit $EXIT

  digest:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "henry-blog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Run AI Digest
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          npx tsx scripts/run-digest.ts 2>&1 | tee digest.log
          EXIT=${PIPESTATUS[0]}
          if grep -qiE "hit your limit|quota.*exceeded|rate limit|5-hour limit|usage limit" digest.log; then
            echo "::warning::Claude quota hit — digest will retry in next window"
            exit 0
          fi
          exit $EXIT
