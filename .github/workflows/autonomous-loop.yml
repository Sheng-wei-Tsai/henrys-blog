name: Autonomous Loop

# Triggered automatically after 1 hour of idle Claude Code usage,
# or manually via workflow_dispatch.
#
# Flow per iteration:
#   Iteration 1 only  → Opus 4.7 analyses codebase + updates TODO.md
#   Every iteration   → Sonnet picks one task, implements, opens PR
#   Loop ends when    → quota exhausted (→ Copilot issue) OR PR cap hit
#                       OR max iterations reached

on:
  workflow_dispatch:
    inputs:
      iteration:
        description: 'Current loop iteration (starts at 1)'
        default: '1'
        type: string
      session_id:
        description: 'Session ID for this autonomous run'
        default: ''
        type: string
      max_iterations:
        description: 'Max iterations before stopping (default 8)'
        default: '8'
        type: string
      max_open_prs:
        description: 'Stop if this many unreviewed auto PRs are open'
        default: '5'
        type: string
      window:
        description: 'Quota window index (1-4) — sentinel naming and task priority'
        default: '1'
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  loop:
    name: "Iteration ${{ inputs.iteration }}"
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Guard 1: quota sentinel (epoch-based, self-expiring) ─────────────
      - name: Check quota-reset-at sentinel
        id: quota_guard
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "today=${TODAY}" >> $GITHUB_OUTPUT
          NOW=$(date +%s)

          # Find the latest quota-reset-at/EPOCH sentinel branch
          SENTINEL=$(git ls-remote --heads origin "quota-reset-at/*" 2>/dev/null \
            | awk '{print $2}' | sort -rn | head -1)

          if [ -n "$SENTINEL" ]; then
            EPOCH=$(basename "$SENTINEL")
            if echo "$EPOCH" | grep -qE '^[0-9]{10}$' && [ "$NOW" -lt "$EPOCH" ]; then
              WAIT=$(( (EPOCH - NOW) / 60 ))
              HUMAN=$(date -u -d "@${EPOCH}" '+%H:%M UTC')
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "Quota resets at ${HUMAN} (in ${WAIT} min). Stopping."
              exit 0
            else
              # Expired — clean up so it doesn't accumulate
              git push origin --delete "${SENTINEL#refs/heads/}" 2>/dev/null || true
              echo "Expired sentinel cleaned up — proceeding."
            fi
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      # ── Guard 2: too many open auto PRs ──────────────────────────────────
      - name: Check open PR cap
        id: pr_guard
        if: steps.quota_guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_PRS: ${{ inputs.max_open_prs }}
        run: |
          OPEN=$(gh pr list \
            --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("auto/"))] | length')
          echo "open_prs=${OPEN}" >> $GITHUB_OUTPUT
          if [ "$OPEN" -ge "$MAX_PRS" ]; then
            echo "skip=true"  >> $GITHUB_OUTPUT
            echo "Reached ${MAX_PRS} open PRs. Pausing until you review them."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── Guard 3: iteration cap ────────────────────────────────────────────
      - name: Check iteration cap
        id: iter_guard
        if: steps.quota_guard.outputs.skip == 'false' && steps.pr_guard.outputs.skip == 'false'
        run: |
          CURRENT=${{ inputs.iteration }}
          MAX=${{ inputs.max_iterations }}
          if [ "$CURRENT" -gt "$MAX" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Reached max iterations (${MAX}). Stopping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── Setup ─────────────────────────────────────────────────────────────
      - name: Configure git and gh auth
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          steps.pr_guard.outputs.skip == 'false' &&
          steps.iter_guard.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "TechPath Autonomous Agent"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - uses: actions/setup-node@v4
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          steps.pr_guard.outputs.skip == 'false' &&
          steps.iter_guard.outputs.skip == 'false'
        with:
          node-version: 22

      - name: Install dependencies
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          steps.pr_guard.outputs.skip == 'false' &&
          steps.iter_guard.outputs.skip == 'false'
        run: npm ci

      - name: Install Claude Code CLI
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          steps.pr_guard.outputs.skip == 'false' &&
          steps.iter_guard.outputs.skip == 'false'
        run: npm install -g @anthropic-ai/claude-code

      # ── Phase 1: Opus analysis (iteration 1 only) ────────────────────────
      - name: Check if Opus analysis done today
        id: analysis_guard
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          steps.pr_guard.outputs.skip == 'false' &&
          steps.iter_guard.outputs.skip == 'false' &&
          inputs.iteration == '1'
        run: |
          TODAY=${{ steps.quota_guard.outputs.today }}
          DONE=$(git ls-remote --heads origin "analysis/${TODAY}" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$DONE" -gt "0" ]; then
            echo "skip=true"  >> $GITHUB_OUTPUT
            echo "Analysis already done today — skipping to Sonnet."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Opus analyst
        id: opus
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          steps.pr_guard.outputs.skip == 'false' &&
          steps.iter_guard.outputs.skip == 'false' &&
          inputs.iteration == '1' &&
          steps.analysis_guard.outputs.skip == 'false'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          claude \
            --dangerously-skip-permissions \
            --model claude-opus-4-7 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep" \
            -p "$(cat .github/prompts/analyst.md)" 2>&1 | tee opus.log
          sed -i 's/\x1b\[[0-9;]*[mGKHFJSTsu]//g' opus.log
          if grep -qiE "hit your limit|resets.*utc|credit balance is too low|insufficient credits?|quota.*exceeded|billing.*hard limit|usage limit reached|rate limit(ed)?|5-hour limit|claude ai usage limit|try again.{0,30}(hour|later)" opus.log; then
            echo "quota_exhausted=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Opus quota exhausted during analysis."
          else
            echo "quota_exhausted=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Create analysis marker branch
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          steps.pr_guard.outputs.skip == 'false' &&
          steps.iter_guard.outputs.skip == 'false' &&
          inputs.iteration == '1' &&
          steps.analysis_guard.outputs.skip == 'false' &&
          steps.opus.outputs.quota_exhausted != 'true'
        env:
          TODAY: ${{ steps.quota_guard.outputs.today }}
        run: |
          git checkout -b "analysis/${TODAY}" 2>/dev/null || true
          git push origin "analysis/${TODAY}" 2>/dev/null || true
          git checkout main

      # ── Phase 2: Sonnet implementation ───────────────────────────────────
      - name: Run Sonnet developer
        id: sonnet
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          steps.pr_guard.outputs.skip == 'false' &&
          steps.iter_guard.outputs.skip == 'false' &&
          steps.opus.outputs.quota_exhausted != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: sk-dummy-ci-build
          STRIPE_SECRET_KEY: sk_test_dummy_ci
          STRIPE_PRICE_ID: price_dummy_ci
          STRIPE_WEBHOOK_SECRET: whsec_dummy_ci
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-ci
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-ci
          NEXT_PUBLIC_APP_URL: https://henrysdigitallife.com
          WINDOW: ${{ inputs.window || '1' }}
        run: |
          set +e
          claude \
            --dangerously-skip-permissions \
            --model claude-sonnet-4-6 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep" \
            -p "$(cat .github/prompts/developer.md)" 2>&1 | tee sonnet.log
          SONNET_EXIT=${PIPESTATUS[0]}
          echo "exit_code=${SONNET_EXIT}" >> "$GITHUB_OUTPUT"

          sed -i 's/\x1b\[[0-9;]*[mGKHFJSTsu]//g' sonnet.log
          if grep -qiE "hit your limit|resets.*utc|credit balance is too low|insufficient credits?|quota.*exceeded|billing.*hard limit|usage limit reached|rate limit(ed)?|5-hour limit|claude ai usage limit|try again.{0,30}(hour|later)" sonnet.log; then
            echo "quota_exhausted=true"  >> "$GITHUB_OUTPUT"
            echo "succeeded=false"       >> "$GITHUB_OUTPUT"
            echo "::warning::Sonnet quota exhausted."
          elif [ "$SONNET_EXIT" -eq 0 ]; then
            echo "quota_exhausted=false" >> "$GITHUB_OUTPUT"
            echo "succeeded=true"        >> "$GITHUB_OUTPUT"
          else
            echo "quota_exhausted=false" >> "$GITHUB_OUTPUT"
            echo "succeeded=false"       >> "$GITHUB_OUTPUT"
          fi
          exit 0

      # ── Quota exhausted: parse reset time, sentinel, sleep-restart ──────
      - name: Parse reset time and push quota sentinel
        id: quota_sentinel
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          (steps.opus.outputs.quota_exhausted == 'true' || steps.sonnet.outputs.quota_exhausted == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SESSION_ID: ${{ inputs.session_id }}
          MAX_ITER: ${{ inputs.max_iterations }}
          MAX_PRS: ${{ inputs.max_open_prs }}
          WINDOW: ${{ inputs.window || '1' }}
        run: |
          # Pick whichever log has content
          LOG="sonnet.log"
          [ ! -s "$LOG" ] && LOG="opus.log"

          # Parse "resets H:MMam (UTC)" from Claude output
          RAW=$(grep -oiE "resets [0-9]{1,2}:[0-9]{2} ?(am|pm)" "$LOG" 2>/dev/null | head -1)
          RESET_EPOCH=""
          if [ -n "$RAW" ]; then
            TPART=$(echo "$RAW" | sed 's/resets //')
            NOW=$(date +%s)
            CANDIDATE=$(date -u -d "today ${TPART}" +%s 2>/dev/null || echo "")
            if [ -n "$CANDIDATE" ]; then
              [ "$CANDIDATE" -le "$NOW" ] && CANDIDATE=$(date -u -d "tomorrow ${TPART}" +%s)
              RESET_EPOCH="$CANDIDATE"
            fi
          fi
          # Fallback: 5 hours from now if parse failed
          [ -z "$RESET_EPOCH" ] && RESET_EPOCH=$(date -u -d '+5 hours' +%s)

          NOW=$(date +%s)
          WAIT_SECS=$(( RESET_EPOCH - NOW ))
          WAIT_MINS=$(( (WAIT_SECS + 59) / 60 ))
          RESET_HUMAN=$(date -u -d "@${RESET_EPOCH}" '+%H:%M UTC %Y-%m-%d')
          SENTINEL="quota-reset-at/${RESET_EPOCH}"

          echo "reset_epoch=${RESET_EPOCH}" >> "$GITHUB_OUTPUT"
          echo "reset_human=${RESET_HUMAN}"  >> "$GITHUB_OUTPUT"

          # Push self-expiring sentinel — branch name IS the reset epoch
          git checkout -b "$SENTINEL" 2>/dev/null || true
          git push origin "$SENTINEL" 2>/dev/null || true
          git checkout main
          echo "Sentinel pushed: ${SENTINEL} (resets ${RESET_HUMAN})"

          # Set sleep_restart flag BEFORE step summary so subsequent steps see it
          if [ "$WAIT_SECS" -gt 0 ] && [ "$WAIT_SECS" -lt 4800 ]; then
            echo "sleep_restart=true" >> "$GITHUB_OUTPUT"
          else
            echo "sleep_restart=false" >> "$GITHUB_OUTPUT"
          fi

          # GitHub Step Summary — reset time visible in Actions UI
          {
            echo "## ⏳ Claude Quota Exhausted"
            echo "| | |"
            echo "|---|---|"
            echo "| **Resets at** | \`${RESET_HUMAN}\` |"
            echo "| **Wait** | ~${WAIT_MINS} min |"
            echo "| **Sentinel** | \`${SENTINEL}\` |"
            echo ""
            if [ "$WAIT_SECS" -lt 4800 ]; then
              echo "**This job will sleep and auto-restart the loop when quota refreshes.**"
            else
              echo "Scheduler auto-restarts once reset epoch passes."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Sleep-and-restart when reset < 80 min (safe within 90-min job timeout)
          if [ "$WAIT_SECS" -gt 0 ] && [ "$WAIT_SECS" -lt 4800 ]; then
            SLEEP_TIME=$(( WAIT_SECS + 180 ))
            echo "Sleeping ${SLEEP_TIME}s until ${RESET_HUMAN}..."
            sleep "$SLEEP_TIME"
            # Delete sentinel — quota now fresh
            git push origin --delete "$SENTINEL" 2>/dev/null || true
            gh workflow run autonomous-loop.yml \
              --repo "$GITHUB_REPOSITORY" --ref main \
              --field iteration="1" \
              --field session_id="${SESSION_ID}-resume" \
              --field max_iterations="${MAX_ITER}" \
              --field max_open_prs="${MAX_PRS}" \
              --field window="${WINDOW}"
            echo "Loop restarted after quota reset!"
          fi

      - name: Check for existing Copilot issue
        id: existing_issue
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          (steps.opus.outputs.quota_exhausted == 'true' || steps.sonnet.outputs.quota_exhausted == 'true') &&
          steps.quota_sentinel.outputs.sleep_restart != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TODAY: ${{ steps.quota_guard.outputs.today }}
        run: |
          COUNT=$(gh issue list \
            --search "Copilot Fallback ${TODAY} in:title" \
            --state all --json number --jq 'length')
          echo "count=${COUNT}" >> $GITHUB_OUTPUT

      - name: Parse next TODO task for Copilot
        id: copilot_todo
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          (steps.opus.outputs.quota_exhausted == 'true' || steps.sonnet.outputs.quota_exhausted == 'true') &&
          steps.quota_sentinel.outputs.sleep_restart != 'true' &&
          steps.existing_issue.outputs.count == '0'
        run: |
          python3 - << 'PYEOF'
          import re, os
          with open("TODO.md", "r") as f:
              content = f.read()
          skip_sections = ["Stripe Production Launch"]
          skip_keywords = ["community network","b2b","claude lab","i18n","zh-tw","navigation restructure","gemini multimodal","vercel kv","anonymous job seeker","company research ai"]
          lines = content.split("\n")
          in_skip = False
          tasks = []
          for line in lines:
              for s in skip_sections:
                  if s in line: in_skip = True
              if in_skip and re.match(r'^## ', line) and not any(s in line for s in skip_sections):
                  in_skip = False
              if in_skip: continue
              if re.match(r'^- \[ \] .+', line):
                  clean = line.replace("- [ ] ", "").strip()
                  if not any(k in clean.lower() for k in skip_keywords):
                      tasks.append(clean)
          task = tasks[0] if tasks else "NO_TASK"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"task={task}\n")
          print(f"Next task: {task}")
          PYEOF

      - name: Create Copilot fallback issue
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          (steps.opus.outputs.quota_exhausted == 'true' || steps.sonnet.outputs.quota_exhausted == 'true') &&
          steps.quota_sentinel.outputs.sleep_restart != 'true' &&
          steps.existing_issue.outputs.count == '0' &&
          steps.copilot_todo.outputs.task != 'NO_TASK'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK: ${{ steps.copilot_todo.outputs.task }}
          TODAY: ${{ steps.quota_guard.outputs.today }}
        run: |
          python3 - << 'PYEOF'
          import os
          task = os.environ['TASK']
          today = os.environ['TODAY']
          lines = [
              '## Task', '',
              task, '',
              'Quota exhausted during autonomous loop. GitHub Copilot Pro+ picking up.', '',
              '---', '',
              '**Stack:** Next.js 16.2 App Router, TypeScript strict, Supabase, Stripe, Vercel',
              'Read AGENTS.md before touching any file.', '',
              'Open PR titled `[Copilot] type(scope): description`. Do NOT merge.', '',
              f'*Autonomous Loop — quota exhausted on {today}*',
          ]
          with open('/tmp/issue_body.txt', 'w') as fh:
              fh.write('\n'.join(lines))
          PYEOF

          gh label create "copilot-fallback" --color "0075ca" --description "Task picked up by Copilot when Claude quota is exhausted" 2>/dev/null || true
          ISSUE_URL=$(gh issue create \
            --title "[Copilot Fallback] ${TODAY} — ${TASK}" \
            --label "copilot-fallback" \
            --body-file /tmp/issue_body.txt)
          echo "Created: ${ISSUE_URL}"
          gh issue edit "${ISSUE_URL}" --add-assignee "Copilot" 2>/dev/null \
            || echo "::warning::Could not assign @Copilot — enable Copilot coding agent in repo settings."

      # ── Re-dispatch next iteration ────────────────────────────────────────
      - name: Queue next iteration
        if: |
          steps.quota_guard.outputs.skip == 'false' &&
          steps.pr_guard.outputs.skip == 'false' &&
          steps.iter_guard.outputs.skip == 'false' &&
          steps.sonnet.outputs.succeeded == 'true' &&
          steps.sonnet.outputs.quota_exhausted != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SESSION_ID: ${{ inputs.session_id }}
          MAX_ITER: ${{ inputs.max_iterations }}
          MAX_PRS: ${{ inputs.max_open_prs }}
        run: |
          NEXT=$(( ${{ inputs.iteration }} + 1 ))
          echo "Iteration ${{ inputs.iteration }} complete. Queuing iteration ${NEXT}..."
          gh workflow run autonomous-loop.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field iteration="${NEXT}" \
            --field session_id="${SESSION_ID}" \
            --field max_iterations="${MAX_ITER}" \
            --field max_open_prs="${MAX_PRS}"

      # ── Propagate real failures ───────────────────────────────────────────
      - name: Propagate non-quota Sonnet failure
        if: |
          steps.sonnet.outputs.succeeded == 'false' &&
          steps.sonnet.outputs.quota_exhausted != 'true'
        run: |
          echo "::error::Sonnet failed (exit ${{ steps.sonnet.outputs.exit_code }}, not quota-related)."
          exit 1
