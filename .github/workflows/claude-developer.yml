name: Claude Daily Developer (Sonnet)

# Runs every hour. Exits in seconds if already ran today.
# First run after Anthropic quota resets → picks next TODO task,
# implements it, passes quality gate, opens [Auto] PR for owner review.

on:
  schedule:
    - cron: '30 * * * *'   # half-past each hour (30 min after analyst)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  developer:
    name: Sonnet Developer
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if implementation already done today
        id: guard
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "today=${TODAY}" >> $GITHUB_OUTPUT
          EXISTING=$(git ls-remote --heads origin "auto/${TODAY}/" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$EXISTING" -gt "0" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already implemented today. Exiting."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Starting Sonnet implementation."
          fi

      - name: Configure git and gh auth
        if: steps.guard.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "TechPath Sonnet Developer"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          echo "${GITHUB_TOKEN}" | gh auth login --with-token

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip == 'false'
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: npm ci

      - name: Install Claude Code CLI
        if: steps.guard.outputs.skip == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Sonnet developer
        if: steps.guard.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: sk-dummy-ci-build
          STRIPE_SECRET_KEY: sk_test_dummy_ci
          STRIPE_PRICE_ID: price_dummy_ci
          STRIPE_WEBHOOK_SECRET: whsec_dummy_ci
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-ci
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-ci
          NEXT_PUBLIC_APP_URL: https://henrysdigitallife.com
        run: |
          claude \
            --bare \
            --dangerously-skip-permissions \
            --model claude-sonnet-4-6 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep" \
            -p "$(cat .github/prompts/developer.md)"
