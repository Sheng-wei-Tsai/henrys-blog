name: Claude Daily Developer (Sonnet)

# Runs every hour. Exits in seconds if already ran today.
# Picks ONE task from TODO.md, implements it, passes quality gate,
# pushes directly to main, creates dev-done/DATE sentinel.
# No PRs — fixes land in main immediately so TODO.md stays up to date.
# On credit exhaustion → pushes quota-reset-at/EPOCH sentinel, creates Copilot issue.

on:
  schedule:
    - cron: '30 * * * *'   # half-past each hour (30 min after analyst)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  developer:
    name: Sonnet Developer
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if implementation or credit-exhaustion already recorded today
        id: guard
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "today=${TODAY}" >> $GITHUB_OUTPUT

          # Check epoch-based quota sentinel (self-expiring)
          NOW=$(date +%s)
          SENTINEL=$(git ls-remote --heads origin "quota-reset-at/*" 2>/dev/null \
            | awk '{print $2}' | sort -rn | head -1)
          if [ -n "$SENTINEL" ]; then
            EPOCH=$(basename "$SENTINEL")
            if echo "$EPOCH" | grep -qE '^[0-9]{10}$' && [ "$NOW" -lt "$EPOCH" ]; then
              WAIT=$(( (EPOCH - NOW) / 60 ))
              HUMAN=$(date -u -d "@${EPOCH}" '+%H:%M UTC')
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "Quota resets at ${HUMAN} (in ${WAIT} min). Exiting."
              exit 0
            else
              git push origin --delete "${SENTINEL#refs/heads/}" 2>/dev/null || true
            fi
          fi

          WIN_COUNT=$(git ls-remote --heads origin | grep "dev-done/${TODAY}-w" | wc -l | tr -d ' ')
          WINDOW=$((WIN_COUNT + 1))
          echo "window=${WINDOW}" >> $GITHUB_OUTPUT

          if [ "$WIN_COUNT" -ge "4" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "All 4 quota windows used today. Exiting."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Starting Sonnet window ${WINDOW}/4 — will push directly to main."
          fi

      - name: Configure git and gh auth
        if: steps.guard.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "TechPath Sonnet Developer"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          gh auth status 2>&1 || true  # GH_TOKEN env var handles auth automatically

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip == 'false'
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: npm ci

      - name: Install Claude Code CLI
        if: steps.guard.outputs.skip == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Sonnet developer
        id: claude
        if: steps.guard.outputs.skip == 'false'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: sk-dummy-ci-build
          STRIPE_SECRET_KEY: sk_test_dummy_ci
          STRIPE_PRICE_ID: price_dummy_ci
          STRIPE_WEBHOOK_SECRET: whsec_dummy_ci
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-ci
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-ci
          NEXT_PUBLIC_APP_URL: https://henrysdigitallife.com
          WINDOW: ${{ steps.guard.outputs.window }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN=$(printf '%s' "${CLAUDE_CODE_OAUTH_TOKEN}" | tr -d '\r\n')
          set +e
          claude \
            --dangerously-skip-permissions \
            --model claude-sonnet-4-6 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep" \
            -p "$(cat .github/prompts/developer.md)" 2>&1 | tee claude.log
          CLAUDE_EXIT=${PIPESTATUS[0]}
          echo "exit_code=${CLAUDE_EXIT}" >> "$GITHUB_OUTPUT"

          sed -i 's/\x1b\[[0-9;]*[mGKHFJSTsu]//g' claude.log
          if grep -qiE "hit your limit|resets.*utc|credit balance is too low|insufficient credits?|quota.*exceeded|billing.*hard limit|usage limit reached|rate limit(ed)?|5-hour limit|claude ai usage limit|try again.{0,30}(hour|later)|api error: header .* has invalid value|oauth.*expired|unauthorized|invalid.*api.*key" claude.log; then
            echo "claude_unavailable=true"  >> "$GITHUB_OUTPUT"
            echo "succeeded=false"          >> "$GITHUB_OUTPUT"
            echo "::warning::Anthropic unavailable (quota or auth error). Handing off to Copilot fallback."
          elif [ "$CLAUDE_EXIT" -eq 0 ]; then
            echo "claude_unavailable=false" >> "$GITHUB_OUTPUT"
            echo "succeeded=true"           >> "$GITHUB_OUTPUT"
          else
            echo "claude_unavailable=false" >> "$GITHUB_OUTPUT"
            echo "succeeded=false"          >> "$GITHUB_OUTPUT"
            echo "::error::Claude failed with exit code ${CLAUDE_EXIT} (not quota-related)."
          fi

          # Always exit 0 here — downstream steps decide actual job outcome
          exit 0

      - name: Parse reset time and push quota sentinel
        if: steps.guard.outputs.skip == 'false' && steps.claude.outputs.claude_unavailable == 'true'
        run: |
          RAW=$(grep -oiE "resets [0-9]{1,2}:[0-9]{2} ?(am|pm)" claude.log 2>/dev/null | head -1)
          RESET_EPOCH=""
          if [ -n "$RAW" ]; then
            TPART=$(echo "$RAW" | sed 's/resets //')
            NOW=$(date +%s)
            CANDIDATE=$(date -u -d "today ${TPART}" +%s 2>/dev/null || echo "")
            if [ -n "$CANDIDATE" ]; then
              [ "$CANDIDATE" -le "$NOW" ] && CANDIDATE=$(date -u -d "tomorrow ${TPART}" +%s)
              RESET_EPOCH="$CANDIDATE"
            fi
          fi
          [ -z "$RESET_EPOCH" ] && RESET_EPOCH=$(date -u -d '+5 hours' +%s)

          RESET_HUMAN=$(date -u -d "@${RESET_EPOCH}" '+%H:%M UTC %Y-%m-%d')
          NOW=$(date +%s)
          WAIT_MINS=$(( (RESET_EPOCH - NOW + 59) / 60 ))
          SENTINEL="quota-reset-at/${RESET_EPOCH}"

          git checkout -b "$SENTINEL" 2>/dev/null || git checkout "$SENTINEL"
          git push origin "$SENTINEL" 2>/dev/null || true
          git checkout main
          echo "Sentinel: ${SENTINEL} — resets ${RESET_HUMAN}"

          {
            echo "## ⏳ Claude Developer Quota Exhausted"
            echo "| | |"
            echo "|---|---|"
            echo "| **Resets at** | \`${RESET_HUMAN}\` |"
            echo "| **Wait** | ~${WAIT_MINS} min |"
            echo "| **Sentinel** | \`${SENTINEL}\` |"
            echo ""
            echo "Hourly developer cron skips until reset epoch passes."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check for existing Copilot fallback issue
        id: existing_issue
        if: steps.guard.outputs.skip == 'false' && steps.claude.outputs.claude_unavailable == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TODAY: ${{ steps.guard.outputs.today }}
        run: |
          COUNT=$(gh issue list \
            --search "Copilot Fallback ${TODAY} in:title" \
            --state all \
            --json number \
            --jq 'length')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Parse next TODO task for Copilot
        id: todo
        if: |
          steps.guard.outputs.skip == 'false' &&
          steps.claude.outputs.claude_unavailable == 'true' &&
          steps.existing_issue.outputs.count == '0'
        run: |
          python3 - << 'PYEOF'
          import re, os

          with open("TODO.md", "r") as f:
              content = f.read()

          skip_sections = ["Stripe Production Launch"]
          skip_keywords = [
              "community network", "b2b", "claude lab", "i18n", "zh-tw",
              "navigation restructure", "gemini multimodal", "vercel kv",
              "anonymous job seeker", "company research ai"
          ]

          lines = content.split("\n")
          in_skip = False
          tasks = []

          for line in lines:
              for s in skip_sections:
                  if s in line:
                      in_skip = True
              if in_skip and re.match(r'^## ', line) and not any(s in line for s in skip_sections):
                  in_skip = False
              if in_skip:
                  continue
              if re.match(r'^- \[ \] .+', line):
                  clean = line.replace("- [ ] ", "").strip()
                  if not any(k in clean.lower() for k in skip_keywords):
                      tasks.append(clean)

          task = tasks[0] if tasks else "NO_TASK"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"task={task}\n")

          print(f"Next task: {task}")
          PYEOF

      - name: Fetch latest Opus analysis for Copilot context
        id: analysis
        if: |
          steps.guard.outputs.skip == 'false' &&
          steps.claude.outputs.claude_unavailable == 'true' &&
          steps.existing_issue.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list \
            --search "[Daily Analysis] in:title" \
            --state all \
            --json body,createdAt \
            --jq 'sort_by(.createdAt) | last | .body' \
            --limit 10 2>/dev/null | head -c 3000 > /tmp/analysis_context.txt || true
          [ -s /tmp/analysis_context.txt ] || echo "No recent Opus analysis found." > /tmp/analysis_context.txt

      - name: Create Copilot fallback issue
        if: |
          steps.guard.outputs.skip == 'false' &&
          steps.claude.outputs.claude_unavailable == 'true' &&
          steps.existing_issue.outputs.count == '0' &&
          steps.todo.outputs.task != 'NO_TASK'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK: ${{ steps.todo.outputs.task }}
          TODAY: ${{ steps.guard.outputs.today }}
        run: |
          python3 - << 'PYEOF'
          import os
          task = os.environ['TASK']
          today = os.environ['TODAY']
          analysis = 'No analysis available.'
          try:
              analysis = open('/tmp/analysis_context.txt').read().strip()
          except OSError:
              pass
          b3 = '`' * 3
          lines = [
              '## Task', '',
              task, '',
              'Anthropic quota exhausted today — GitHub Copilot Pro+ is picking up.', '',
              '---', '',
              '## Codebase analysis (from Opus analyst — read before implementing)', '',
              analysis, '',
              '---', '',
              '## Project context', '',
              '**TechPath AU** — career platform for international IT graduates in Australia.',
              'Live at: https://henrysdigitallife.com', '',
              '**Stack:** Next.js 16.2 App Router, TypeScript strict, Supabase, Stripe, Vercel', '',
              '**Critical rules (read AGENTS.md before touching any file):**',
              '- `cookies()`, `headers()`, `params` are async in Next.js 16 — always `await` them',
              '- Every AI-calling API route must call `requireSubscription()` first',
              '- Colours: `var(--token-name)` only — never hardcoded hex',
              '- Images: `next/image` only — never raw `<img>`',
              '- Internal links: `<Link>` only — never `<a href>`',
              '- Styling: CSS custom properties + inline styles — no Tailwind', '',
              '## Quality gate — run before opening PR', '',
              f'{b3}bash',
              'export OPENAI_API_KEY=sk-dummy-ci-build STRIPE_SECRET_KEY=sk_test_dummy_ci',
              'export STRIPE_PRICE_ID=price_dummy_ci STRIPE_WEBHOOK_SECRET=whsec_dummy_ci',
              'export NEXT_PUBLIC_SUPABASE_URL=https://dummy.supabase.co',
              'export NEXT_PUBLIC_SUPABASE_ANON_KEY=dummy-anon-key-ci',
              'export SUPABASE_SERVICE_ROLE_KEY=dummy-service-role-ci',
              'export NEXT_PUBLIC_APP_URL=https://henrysdigitallife.com',
              '',
              'npx tsc --noEmit && npm audit --audit-level=moderate && npx vitest run && npm run build',
              f'{b3}', '',
              '## Commit format', '',
              f'{b3}',
              'type(scope): summary under 72 chars',
              f'{b3}',
              'Types: feat | fix | security | perf | refactor | style | chore', '',
              '## When done', '',
              '- Open PR titled `[Copilot] type(scope): description`',
              f'- Mark task done in TODO.md: `- [ ]` → `- [x] {today}`',
              '- Do NOT merge — owner reviews on phone and merges', '',
              '---',
              f'*Copilot Fallback — Anthropic credit balance exhausted on {today}*',
          ]
          with open('/tmp/issue_body.txt', 'w') as fh:
              fh.write('\n'.join(lines))
          PYEOF

          gh label create "copilot-fallback" --color "0075ca" --description "Task picked up by Copilot when Claude quota is exhausted" 2>/dev/null || true
          ISSUE_URL=$(gh issue create \
            --title "[Copilot Fallback] ${TODAY} — ${TASK}" \
            --label "copilot-fallback" \
            --body-file /tmp/issue_body.txt)
          echo "Created issue: ${ISSUE_URL}"
          gh issue edit "${ISSUE_URL}" --add-assignee "Copilot" 2>/dev/null \
            || echo "::warning::Could not assign @Copilot. Enable Copilot coding agent in repo settings."

      - name: Log non-credit Claude failure (non-fatal)
        if: |
          steps.guard.outputs.skip == 'false' &&
          steps.claude.outputs.succeeded == 'false' &&
          steps.claude.outputs.claude_unavailable != 'true'
        run: |
          echo "::warning::Claude developer exited with code ${{ steps.claude.outputs.exit_code }} (not credit-related). No PR opened — check claude.log for details."
          # Not failing CI — a build or test failure inside Claude is expected
          # occasionally and should not redline the workflow run.
