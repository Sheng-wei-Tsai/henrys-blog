name: Scrape AU IT Jobs

on:
  schedule:
    - cron: '0 20 * * *'  # 6am AEST (UTC+10) daily
  workflow_dispatch: {}    # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # Apify actors can take up to 10 min each

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape AU IT jobs (Greenhouse + Lever + Jora + ACS + 80kh + Apify)
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_KEY:             ${{ secrets.APIFY_API_KEY }}
        run: npx tsx scripts/scrape-au-jobs.ts
